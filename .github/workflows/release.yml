name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.archive }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: piadazip
            archive: piadazip-linux-x86_64.tar.gz

          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            binary: piadazip
            archive: piadazip-linux-aarch64.tar.gz
            use_cross: true

          - os: macos-latest
            target: aarch64-apple-darwin
            binary: piadazip
            archive: piadazip-macos-aarch64.tar.gz

          - os: macos-latest
            target: x86_64-apple-darwin
            binary: piadazip
            archive: piadazip-macos-x86_64.tar.gz

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: piadazip.exe
            archive: piadazip-windows-x86_64.zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross == true
        run: |
          curl -fsSL "https://github.com/cross-rs/cross/releases/latest/download/cross-x86_64-unknown-linux-musl.tar.gz" \
            | tar -xzf - -C ~/.cargo/bin cross

      - name: Build
        shell: bash
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf "$GITHUB_WORKSPACE/${{ matrix.archive }}" ${{ matrix.binary }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          cd target\${{ matrix.target }}\release
          Compress-Archive -Path ${{ matrix.binary }} -DestinationPath "$env:GITHUB_WORKSPACE\${{ matrix.archive }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}

  release:
    name: Create release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Generate checksums
        run: |
          sha256sum piadazip-*.tar.gz piadazip-*.zip > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            piadazip-*.tar.gz
            piadazip-*.zip
            SHA256SUMS.txt
          generate_release_notes: true
